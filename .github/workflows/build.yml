name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Compiler Build & Tests ──────────────────────────
  compiler:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            cc: gcc
          - os: ubuntu-latest
            cc: clang
          - os: macos-latest
            cc: clang

    runs-on: ${{ matrix.os }}
    env:
      CC: ${{ matrix.cc }}

    steps:
      - uses: actions/checkout@v4

      - name: Build mansaf
        run: make clean && make

      - name: Run test suite
        run: make test

      - name: Run all examples
        run: make run-all

      - name: Verify install target
        run: make install DESTDIR=/tmp/nashmic-install PREFIX=/usr && ls -la /tmp/nashmic-install/usr/bin/mansaf

  # ── Tree-sitter Grammar ────────────────────────────
  tree-sitter:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editor/tree-sitter-nashmic

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install tree-sitter CLI
        run: npm install --ignore-scripts

      - name: Generate parser
        run: npx tree-sitter generate

      - name: Run corpus tests
        run: npx tree-sitter test

      - name: Init tree-sitter config
        run: npx tree-sitter init-config

      - name: Parse example files
        run: |
          for f in ../../examples/*.nsh; do
            echo "--- Parsing $f ---"
            npx tree-sitter parse "$f" || exit 1
          done

  # ── VS Code Extension ──────────────────────────────
  vscode-extension:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editor/vscode-nashmic

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate package.json
        run: node -e "const p = require('./package.json'); if (!p.name || !p.version || !p.engines) { process.exit(1); } console.log(p.name + '@' + p.version + ' OK');"

      - name: Check grammar file exists
        run: test -f syntaxes/nashmic.tmLanguage.json

      - name: Check language configuration
        run: node -e "JSON.parse(require('fs').readFileSync('language-configuration.json','utf8')); console.log('language-configuration.json OK');"

      - name: Check snippets valid JSON
        run: node -e "JSON.parse(require('fs').readFileSync('snippets/nashmic.json','utf8')); console.log('snippets OK');"

      - name: Check extension.js syntax
        run: node -c extension.js && echo "extension.js OK"

      - name: Check formatter.js syntax
        run: node -c formatter.js && echo "formatter.js OK"

  # ── Playground ──────────────────────────────────────
  playground:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate playground HTML
        run: test -f docs/site/playground/index.html

      - name: Validate playground JS syntax
        run: node -c docs/site/playground/app.js && echo "app.js OK"

      - name: Check tools/playground in sync with docs
        run: |
          diff tools/playground/app.js docs/site/playground/app.js
          diff tools/playground/examples.js docs/site/playground/examples.js

  # ── Packaging Validation ────────────────────────────
  packaging:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build compiler
        run: make clean && make

      - name: Test deb packaging script
        run: |
          bash packaging/deb/build-deb.sh 0.0.0-test amd64
          dpkg-deb --info nashmic_0.0.0-test_amd64.deb
          dpkg-deb --contents nashmic_0.0.0-test_amd64.deb

      - name: Validate AUR PKGBUILD syntax
        run: bash -n packaging/aur/PKGBUILD
