name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            cc: gcc
            artifact: mansaf-linux-x86_64
            arch: amd64
          - os: macos-latest
            cc: clang
            artifact: mansaf-macos-x86_64
            arch: amd64
          - os: macos-14
            cc: clang
            artifact: mansaf-macos-arm64
            arch: arm64

    runs-on: ${{ matrix.os }}
    env:
      CC: ${{ matrix.cc }}

    steps:
      - uses: actions/checkout@v4

      - name: Build mansaf
        run: make clean && make

      - name: Run test suite
        run: make test

      - name: Run all examples
        run: make run-all

      - name: Package binary
        run: |
          mkdir -p dist
          cp build/mansaf dist/${{ matrix.artifact }}
          cp runtime/nsh_runtime.c dist/
          cp runtime/nsh_runtime.h dist/
          cp -r stdlib dist/stdlib
          tar -czf ${{ matrix.artifact }}.tar.gz -C dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  build-deb:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build compiler
        run: make clean && make

      - name: Build .deb package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          bash packaging/deb/build-deb.sh "$VERSION" amd64

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: nashmic-deb
          path: nashmic_*.deb

  release:
    needs: [build, build-deb]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.deb
